<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stress Check - 스트레스 자가진단</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#74ebd5,#ACB6E5);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    background:white;
    width:100%;
    max-width:850px;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

h1{
    text-align:center;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#666;
    margin-bottom:25px;
}

.question{
    margin-bottom:25px;
    padding:15px;
    border-radius:12px;
    background:#f7f7f7;
}

.question h3{
    margin-bottom:10px;
    font-size:17px;
}

.options{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
}

.options label{
    cursor:pointer;
}

.options input{
    margin-right:5px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
    background:#4a6cf7;
    color:white;
    transition:0.3s;
}

button:hover{
    opacity:0.9;
}

.result{
    margin-top:25px;
    padding:20px;
    border-radius:15px;
    display:none;
    text-align:center;
    animation:fadeIn .6s;
}

.low{
    background:#d4edda;
}

.medium{
    background:#fff3cd;
}

.high{
    background:#f8d7da;
}

.progress{
    height:10px;
    background:#ddd;
    border-radius:20px;
    overflow:hidden;
    margin-bottom:25px;
}

.progress-bar{
    height:100%;
    width:0%;
    background:#4a6cf7;
    transition:0.4s;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>

<body>

<div class="container">

<h1>🧠 Stress Check</h1>
<p class="subtitle">대학생 스트레스 자가진단</p>

<div class="progress">
    <div class="progress-bar" id="progressBar"></div>
</div>

<form id="stressForm">

<div class="question">
<h3>1. 최근 충분한 수면을 취하지 못했다.</h3>
<div class="options">
<label><input type="radio" name="q1" value="0">전혀 아니다</label>
<label><input type="radio" name="q1" value="1">아니다</label>
<label><input type="radio" name="q1" value="2">보통</label>
<label><input type="radio" name="q1" value="3">그렇다</label>
<label><input type="radio" name="q1" value="4">매우 그렇다</label>
</div>
</div>

<div class="question">
<h3>2. 해야 할 일이 많아 부담을 느낀다.</h3>
<div class="options">
<label><input type="radio" name="q2" value="0">전혀 아니다</label>
<label><input type="radio" name="q2" value="1">아니다</label>
<label><input type="radio" name="q2" value="2">보통</label>
<label><input type="radio" name="q2" value="3">그렇다</label>
<label><input type="radio" name="q2" value="4">매우 그렇다</label>
</div>
</div>

<div class="question">
<h3>3. 쉽게 짜증이 난다.</h3>
<div class="options">
<label><input type="radio" name="q3" value="0">전혀 아니다</label>
<label><input type="radio" name="q3" value="1">아니다</label>
<label><input type="radio" name="q3" value="2">보통</label>
<label><input type="radio" name="q3" value="3">그렇다</label>
<label><input type="radio" name="q3" value="4">매우 그렇다</label>
</div>
</div>

<div class="question">
<h3>4. 집중하기 어렵다.</h3>
<div class="options">
<label><input type="radio" name="q4" value="0">전혀 아니다</label>
<label><input type="radio" name="q4" value="1">아니다</label>
<label><input type="radio" name="q4" value="2">보통</label>
<label><input type="radio" name="q4" value="3">그렇다</label>
<label><input type="radio" name="q4" value="4">매우 그렇다</label>
</div>
</div>

<div class="question">
<h3>5. 피로감을 자주 느낀다.</h3>
<div class="options">
<label><input type="radio" name="q5" value="0">전혀 아니다</label>
<label><input type="radio" name="q5" value="1">아니다</label>
<label><input type="radio" name="q5" value="2">보통</label>
<label><input type="radio" name="q5" value="3">그렇다</label>
<label><input type="radio" name="q5" value="4">매우 그렇다</label>
</div>
</div>

<div class="question">
<h3>6. 걱정 때문에 마음이 불편하다.</h3>
<div class="options">
<label><input type="radio" name="q6" value="0">전혀 아니다</label>
<label><input type="radio" name="q6" value="1">아니다</label>
<label><input type="radio" name="q6" value="2">보통</label>
<label><input type="radio" name="q6" value="3">그렇다</label>
<label><input type="radio" name="q6" value="4">매우 그렇다</label>
</div>
</div>

<div class="question">
<h3>7. 최근 스트레스를 많이 받고 있다고 느낀다.</h3>
<div class="options">
<label><input type="radio" name="q7" value="0">전혀 아니다</label>
<label><input type="radio" name="q7" value="1">아니다</label>
<label><input type="radio" name="q7" value="2">보통</label>
<label><input type="radio" name="q7" value="3">그렇다</label>
<label><input type="radio" name="q7" value="4">매우 그렇다</label>
</div>
</div>

<div class="question">
<h3>8. 긴장을 자주 느낀다.</h3>
<div class="options">
<label><input type="radio" name="q8" value="0">전혀 아니다</label>
<label><input type="radio" name="q8" value="1">아니다</label>
<label><input type="radio" name="q8" value="2">보통</label>
<label><input type="radio" name="q8" value="3">그렇다</label>
<label><input type="radio" name="q8" value="4">매우 그렇다</label>
</div>
</div>

<div class="question">
<h3>9. 여유 시간이 부족하다.</h3>
<div class="options">
<label><input type="radio" name="q9" value="0">전혀 아니다</label>
<label><input type="radio" name="q9" value="1">아니다</label>
<label><input type="radio" name="q9" value="2">보통</label>
<label><input type="radio" name="q9" value="3">그렇다</label>
<label><input type="radio" name="q9" value="4">매우 그렇다</label>
</div>
</div>

<div class="question">
<h3>10. 최근 감정 조절이 어렵다고 느꼈다.</h3>
<div class="options">
<label><input type="radio" name="q10" value="0">전혀 아니다</label>
<label><input type="radio" name="q10" value="1">아니다</label>
<label><input type="radio" name="q10" value="2">보통</label>
<label><input type="radio" name="q10" value="3">그렇다</label>
<label><input type="radio" name="q10" value="4">매우 그렇다</label>
</div>
</div>

<button type="button" onclick="calculateStress()">결과 보기</button>

</form>

<div id="result" class="result"></div>

</div>

<script>

const radios = document.querySelectorAll('input[type="radio"]');

radios.forEach(radio=>{
    radio.addEventListener('change',updateProgress);
});

function updateProgress(){
    const answered = new Set();

    document.querySelectorAll('input[type="radio"]:checked').forEach(r=>{
        answered.add(r.name);
    });

    const percent = (answered.size/10)*100;
    document.getElementById('progressBar').style.width = percent+'%';
}

function calculateStress(){

    let total = 0;

    for(let i=1;i<=10;i++){

        const checked = document.querySelector(`input[name="q${i}"]:checked`);

        if(!checked){
            alert('모든 문항에 응답해주세요.');
            return;
        }

        total += Number(checked.value);
    }

    const resultDiv = document.getElementById('result');

    let level='';
    let advice='';
    let css='';

    if(total <= 13){
        level='낮은 스트레스';
        advice='현재 비교적 안정적인 상태입니다. 지금의 생활습관을 유지해보세요.';
        css='low';
    }
    else if(total <= 26){
        level='보통 스트레스';
        advice='충분한 휴식과 규칙적인 생활이 필요합니다.';
        css='medium';
    }
    else{
        level='높은 스트레스';
        advice='스트레스 관리가 필요한 상태입니다. 휴식과 상담을 고려해보세요.';
        css='high';
    }

    resultDiv.className='result '+css;
    resultDiv.style.display='block';

    resultDiv.innerHTML=`
        <h2>진단 결과</h2>
        <br>
        <h3>총점 : ${total} / 40</h3>
        <br>
        <h2>${level}</h2>
        <br>
        <p>${advice}</p>
        <br>
        <button onclick="location.reload()">다시 검사하기</button>
    `;

    resultDiv.scrollIntoView({behavior:'smooth'});
}

</script>

</body>
</html>
